<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plutonium Proxy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0e17;
        --tab-bar: #0d1117;
        --tab-inactive: #161b22;
        --tab-active: #0d1117;
        --tab-active-border: rgba(56, 189, 248, 0.5);
        --toolbar: #0d1117;
        --omnibox-bg: #161b22;
        --omnibox-border: #30363d;
        --omnibox-focus: rgba(56, 189, 248, 0.6);
        --content: #0a0e17;
        --text: #e6edf3;
        --text-dim: #8b949e;
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.15);
        --hover: rgba(56, 189, 248, 0.12);
        --glow: 0 0 20px rgba(56, 189, 248, 0.15);
        --surface: rgba(12, 18, 32, 0.78);
        --surface-strong: rgba(11, 17, 30, 0.9);
        --surface-border: rgba(148, 163, 184, 0.18);
      }
      * { box-sizing: border-box; }
      html {
        scroll-behavior: smooth;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }
      /* Snappy, smooth easing */
      :root {
        --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
        --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      }
      .chrome-window {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--content);
      }
      .chrome-tab-bar {
        display: flex;
        align-items: flex-end;
        height: 40px;
        min-height: 40px;
        padding: 0 2px 0 0;
        background: linear-gradient(180deg, var(--tab-bar) 0%, #0a0e17 100%);
        border-bottom: 1px solid rgba(48, 54, 61, 0.6);
      }
      .chrome-nav-buttons {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 0 6px;
        height: 40px;
      }
      .chrome-nav-buttons .icon-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text-dim);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out), transform 0.15s var(--ease-out);
      }
      .chrome-nav-buttons .icon-btn.label-btn {
        width: auto;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .chrome-nav-buttons .icon-btn.attention {
        background: rgba(56, 189, 248, 0.16);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.28);
      }
      .chrome-nav-buttons .icon-btn:active:not(:disabled) {
        transform: scale(0.92);
      }
      .chrome-nav-buttons .icon-btn:hover:not(:disabled) {
        background: var(--hover);
        color: var(--text);
      }
      .chrome-nav-buttons .icon-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .chrome-tabs-wrap {
        display: flex;
        align-items: flex-end;
        flex: 1;
        min-width: 0;
        gap: 2px;
      }
      .chrome-tabs {
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: flex-end;
        gap: 2px;
      }
      .chrome-tabs::-webkit-scrollbar {
        height: 4px;
      }
      .chrome-tabs::-webkit-scrollbar-thumb {
        background: var(--omnibox-border);
        border-radius: 2px;
      }
      .chrome-tab {
        min-width: 80px;
        max-width: 200px;
        height: 32px;
        transition: height 0.2s var(--ease-out), margin-bottom 0.2s var(--ease-out),
          background 0.2s var(--ease-out), border-color 0.2s var(--ease-out),
          color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out),
          opacity 0.15s var(--ease-out), transform 0.15s var(--ease-out);
        padding: 0 12px 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--tab-inactive);
        border: 1px solid transparent;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        margin-right: 0;
        font-size: 12px;
        color: var(--text-dim);
        cursor: pointer;
        flex-shrink: 0;
      }
      .chrome-tab:hover {
        background: #1c2128;
        color: var(--text);
      }
      .chrome-tab.active {
        height: 34px;
        background: var(--tab-active);
        color: var(--text);
        border-color: var(--tab-active-border);
        border-bottom-color: var(--tab-active);
        margin-bottom: -1px;
        box-shadow: var(--glow);
      }
      .chrome-tab-favicon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        border-radius: 3px;
        background: linear-gradient(135deg, var(--accent), #6366f1);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .chrome-tab.loading .chrome-tab-favicon {
        animation: tab-pulse 1s var(--ease-in-out) infinite;
      }
      .chrome-tab-title {
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chrome-tab-close {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: var(--text-dim);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
        transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out), opacity 0.2s var(--ease-out), transform 0.15s var(--ease-out);
      }
      .chrome-tab-close:hover {
        background: rgba(248, 81, 73, 0.2);
        color: #f85149;
        opacity: 1;
      }
      .chrome-tab-close:active {
        transform: scale(0.9);
      }
      .chrome-tab-new {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text-dim);
        font-size: 20px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-left: 2px;
        transition: background 0.2s var(--ease-out), color 0.2s var(--ease-out), transform 0.15s var(--ease-out);
      }
      .chrome-tab-new:hover {
        background: var(--hover);
        color: var(--accent);
      }
      .chrome-tab-new:active {
        transform: scale(0.92);
      }
      .chrome-tab.closing {
        opacity: 0;
        transform: scale(0.96);
        pointer-events: none;
        transition: opacity 0.15s var(--ease-out), transform 0.15s var(--ease-out);
      }
      .chrome-toolbar {
        display: flex;
        align-items: center;
        height: 48px;
        min-height: 48px;
        padding: 0 20px;
        background: linear-gradient(180deg, var(--toolbar) 0%, rgba(13, 17, 23, 0.98) 100%);
        border-bottom: 1px solid rgba(48, 54, 61, 0.5);
      }
      .chrome-omnibox {
        flex: 1;
        max-width: 680px;
        height: 36px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        background: var(--omnibox-bg);
        border: 1px solid var(--omnibox-border);
        border-radius: 10px;
        transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), background 0.2s var(--ease-out);
      }
      .chrome-omnibox:focus-within {
        border-color: var(--omnibox-focus);
        box-shadow: 0 0 0 2px var(--accent-soft);
      }
      .chrome-omnibox-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: var(--text-dim);
      }
      .chrome-omnibox-icon svg { width: 100%; height: 100%; }
      .chrome-omnibox-proto {
        font-size: 11px;
        color: #3fb950;
        font-weight: 500;
      }
      .chrome-omnibox-proto:empty { display: none; }
      .chrome-omnibox-input-wrap { flex: 1; min-width: 0; }
      .chrome-omnibox input {
        all: unset;
        width: 100%;
        font-size: 13px;
        color: var(--text);
      }
      .chrome-omnibox input::placeholder {
        color: var(--text-dim);
      }
      .chrome-content {
        flex: 1;
        min-height: 0;
        background: var(--content);
        position: relative;
        overflow: hidden;
      }
      .chrome-content::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 28%;
        height: 3px;
        border-radius: 0 999px 999px 0;
        background: linear-gradient(90deg, rgba(56, 189, 248, 0) 0%, var(--accent) 45%, #6366f1 100%);
        opacity: 0;
        transform: translateX(-140%);
        pointer-events: none;
        z-index: 2;
      }
      .chrome-content.loading::before {
        opacity: 1;
        animation: chrome-progress 1.15s var(--ease-in-out) infinite;
      }
      .chrome-content .tab-pane {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s var(--ease-out);
        will-change: opacity;
      }
      .chrome-content .tab-pane.active {
        opacity: 1;
        pointer-events: auto;
      }
      .chrome-content .tab-pane[aria-busy="true"] iframe {
        filter: saturate(0.94) brightness(0.98);
      }
      .chrome-content .tab-pane iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: radial-gradient(circle at top, rgba(56, 189, 248, 0.07), transparent 48%), #0b1020;
      }
      .chrome-content .tab-pane iframe.is-hidden {
        display: none;
      }
      .tab-pane-home {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 32px clamp(18px, 4vw, 42px);
        color: var(--text);
        overflow-y: auto;
        background:
          radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 32%),
          radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.16), transparent 36%),
          linear-gradient(180deg, rgba(10, 14, 23, 0.94), rgba(7, 10, 18, 0.98));
      }
      .tab-pane-home.hidden {
        display: none;
      }
      .tab-pane-home::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.18;
        pointer-events: none;
      }
      .tab-pane-home.has-custom-bg {
        background-size: cover;
        background-position: center;
      }
      .home-shell {
        position: relative;
        z-index: 1;
        width: min(1080px, 100%);
        display: grid;
        gap: 22px;
        align-content: start;
      }
      .home-topbar {
        display: flex;
        justify-content: flex-end;
      }
      .home-chip {
        border: 1px solid var(--surface-border);
        background: rgba(12, 18, 32, 0.72);
        color: var(--text);
        border-radius: 999px;
        padding: 9px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(14px);
        transition: transform 0.16s var(--ease-out), border-color 0.2s var(--ease-out), background 0.2s var(--ease-out);
      }
      .home-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 189, 248, 0.35);
        background: rgba(18, 28, 48, 0.84);
      }
      .home-hero {
        padding: 28px;
        border: 1px solid var(--surface-border);
        border-radius: 28px;
        background: linear-gradient(160deg, rgba(10, 17, 31, 0.82), rgba(10, 17, 31, 0.58));
        backdrop-filter: blur(22px);
        box-shadow: 0 22px 60px rgba(3, 8, 20, 0.45);
      }
      .home-brand {
        font-size: 13px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 16px;
      }
      .home-time {
        font-size: clamp(52px, 11vw, 112px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        font-weight: 600;
      }
      .home-date {
        margin-top: 12px;
        font-size: clamp(14px, 2vw, 18px);
        color: var(--text-dim);
      }
      .home-subtitle {
        margin-top: 18px;
        max-width: 640px;
        color: rgba(230, 237, 243, 0.82);
        font-size: 14px;
        line-height: 1.6;
      }
      .home-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
        gap: 22px;
      }
      .bookmark-board,
      .customize-card {
        border: 1px solid var(--surface-border);
        border-radius: 26px;
        background: linear-gradient(180deg, rgba(11, 17, 30, 0.9), rgba(11, 17, 30, 0.72));
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 46px rgba(4, 10, 22, 0.34);
      }
      .bookmark-board {
        padding: 24px;
      }
      .board-title,
      .customize-title {
        margin: 0 0 16px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .bookmark-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 14px;
      }
      .bookmark-card {
        border: 1px solid rgba(56, 189, 248, 0.12);
        border-radius: 20px;
        background: rgba(16, 24, 40, 0.74);
        color: var(--text);
        padding: 18px 16px;
        cursor: pointer;
        text-align: left;
        min-height: 110px;
        transition: transform 0.18s var(--ease-out), border-color 0.2s var(--ease-out), background 0.2s var(--ease-out);
      }
      .bookmark-card:hover {
        transform: translateY(-2px);
        border-color: rgba(56, 189, 248, 0.32);
        background: rgba(18, 30, 52, 0.86);
      }
      .bookmark-icon {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        margin-bottom: 16px;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.24), rgba(99, 102, 241, 0.22));
        font-size: 15px;
        font-weight: 700;
        color: #dff6ff;
      }
      .bookmark-name {
        display: block;
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .bookmark-url {
        display: block;
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.4;
      }
      .customize-card {
        padding: 24px;
        display: grid;
        gap: 14px;
      }
      .customize-body {
        display: none;
        gap: 14px;
      }
      .customize-card.open .customize-body {
        display: grid;
      }
      .panel-label {
        display: grid;
        gap: 8px;
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .panel-input {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(8, 12, 24, 0.9);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.18s var(--ease-out), box-shadow 0.18s var(--ease-out);
      }
      .panel-input:focus {
        border-color: rgba(56, 189, 248, 0.45);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
      }
      .panel-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .panel-button {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 14px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--text);
        background: rgba(15, 23, 42, 0.92);
        transition: transform 0.16s var(--ease-out), border-color 0.18s var(--ease-out);
      }
      .panel-button:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 189, 248, 0.34);
      }
      .panel-button.primary {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.22), rgba(99, 102, 241, 0.2));
        border-color: rgba(56, 189, 248, 0.28);
      }
      .bookmark-list {
        display: grid;
        gap: 10px;
        max-height: 240px;
        overflow-y: auto;
      }
      .bookmark-list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(12, 18, 32, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }
      .bookmark-list-name {
        font-size: 13px;
        font-weight: 600;
      }
      .bookmark-list-url {
        font-size: 11px;
        color: var(--text-dim);
      }
      .bookmark-delete {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #ffb4ad;
        background: rgba(248, 81, 73, 0.14);
      }
      .challenge-hint {
        margin-top: 12px;
        display: none;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #dff6ff;
      }
      .challenge-hint.visible {
        display: inline-flex;
      }
      @media (max-width: 900px) {
        .home-grid {
          grid-template-columns: 1fr;
        }
      }
      @keyframes chrome-progress {
        from {
          transform: translateX(-140%);
        }
        to {
          transform: translateX(420%);
        }
      }
      @keyframes tab-pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06), 0 0 0 rgba(56, 189, 248, 0.35);
        }
        50% {
          transform: scale(1.08);
          box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 0 16px rgba(56, 189, 248, 0.5);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="chrome-window">
      <div class="chrome-tab-bar">
        <div class="chrome-nav-buttons">
          <button type="button" class="icon-btn" id="back-btn" title="Back (Alt+Left)">‹</button>
          <button type="button" class="icon-btn" id="forward-btn" title="Forward (Alt+Right)">›</button>
          <button type="button" class="icon-btn" id="reload-btn" title="Reload">↻</button>
          <button
            type="button"
            class="icon-btn label-btn"
            id="open-direct-btn"
            title="Open the current page directly to handle verification-heavy flows"
          >
            Direct
          </button>
        </div>
        <div class="chrome-tabs-wrap">
          <div class="chrome-tabs" id="tab-strip"></div>
          <button type="button" class="chrome-tab-new" id="new-tab-btn" title="New tab" aria-label="New tab">+</button>
        </div>
      </div>
      <div class="chrome-toolbar">
        <div class="chrome-omnibox" id="chrome-omnibox" role="combobox" aria-label="Address bar">
          <div class="chrome-omnibox-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <span class="chrome-omnibox-proto" id="omnibox-proto"></span>
          <div class="chrome-omnibox-input-wrap">
            <form id="proxy-form">
              <input id="url-input" type="text" autocomplete="off" placeholder="Search Google or type a URL" spellcheck="false" />
            </form>
          </div>
        </div>
      </div>
      <div class="chrome-content" id="chrome-content">
        <div id="tab-panes"></div>
      </div>
    </div>
    <script>
      const FRAME_EVENT_SOURCE = "plutonium-frame";
      const tabStrip = document.getElementById("tab-strip");
      const tabPanes = document.getElementById("tab-panes");
      const chromeContent = document.getElementById("chrome-content");
      const form = document.getElementById("proxy-form");
      const input = document.getElementById("url-input");
      const protoSpan = document.getElementById("omnibox-proto");
      const reloadBtn = document.getElementById("reload-btn");
      const backBtn = document.getElementById("back-btn");
      const forwardBtn = document.getElementById("forward-btn");
      const openDirectBtn = document.getElementById("open-direct-btn");
      const newTabBtn = document.getElementById("new-tab-btn");
      const HOME_STORAGE_KEY = "plutonium-home-settings";
      const DEFAULT_HOME_SETTINGS = {
        backgroundUrl: "",
        bookmarks: [
          { name: "YouTube", url: "https://www.youtube.com/", accent: "YT" },
          { name: "Gmail", url: "https://mail.google.com/", accent: "GM" },
          { name: "GitHub", url: "https://github.com/", accent: "GH" },
          { name: "Reddit", url: "https://www.reddit.com/", accent: "RD" },
          { name: "X", url: "https://x.com/", accent: "X" },
          { name: "Wikipedia", url: "https://www.wikipedia.org/", accent: "WK" },
        ],
      };
      const CLOCK_FORMATTER = new Intl.DateTimeFormat([], {
        hour: "numeric",
        minute: "2-digit",
      });
      const DATE_FORMATTER = new Intl.DateTimeFormat([], {
        weekday: "long",
        month: "long",
        day: "numeric",
      });

      let tabs = [];
      let activeTabId = null;
      let homeSettings = loadHomeSettings();
      let clockTimerId = null;

      function nextId() {
        return "t" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      }

      function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = value;
        return div.innerHTML;
      }

      function proxiedSrc(url) {
        return "/proxy?url=" + encodeURIComponent(url);
      }

      function loadHomeSettings() {
        try {
          const parsed = JSON.parse(localStorage.getItem(HOME_STORAGE_KEY) || "{}");
          const bookmarks = Array.isArray(parsed.bookmarks) && parsed.bookmarks.length
            ? parsed.bookmarks
                .map((bookmark) => normalizeBookmark(bookmark))
                .filter(Boolean)
            : DEFAULT_HOME_SETTINGS.bookmarks.slice();

          return {
            backgroundUrl: typeof parsed.backgroundUrl === "string" ? parsed.backgroundUrl.trim() : "",
            bookmarks,
          };
        } catch {
          return {
            backgroundUrl: "",
            bookmarks: DEFAULT_HOME_SETTINGS.bookmarks.slice(),
          };
        }
      }

      function saveHomeSettings() {
        localStorage.setItem(HOME_STORAGE_KEY, JSON.stringify(homeSettings));
      }

      function normalizeBookmark(bookmark) {
        const name = `${bookmark?.name || ""}`.trim();
        const url = `${bookmark?.url || ""}`.trim();
        if (!name || !url) return null;

        try {
          const normalizedUrl = new URL(url.startsWith("http://") || url.startsWith("https://") ? url : "https://" + url);
          return {
            name,
            url: normalizedUrl.href,
            accent: `${bookmark?.accent || name.slice(0, 2)}`.trim().slice(0, 2).toUpperCase(),
          };
        } catch {
          return null;
        }
      }

      function formatTime(now = new Date()) {
        return CLOCK_FORMATTER.format(now);
      }

      function formatDate(now = new Date()) {
        return DATE_FORMATTER.format(now);
      }

      function challengeLikely(tab) {
        const text = `${tab?.title || ""} ${tab?.url || ""}`.toLowerCase();
        return /captcha|verify|challenge|just a moment|attention required|cloudflare|human/i.test(text);
      }

      function ensureClockTicker() {
        if (clockTimerId) return;
        clockTimerId = window.setInterval(() => {
          renderAllHomescreens();
        }, 1000);
      }

      function getTab(id) {
        return tabs.find((tab) => tab.id === id);
      }

      function getTabByWindow(sourceWindow) {
        return tabs.find((tab) => tab.frame?.contentWindow === sourceWindow) || null;
      }

      function getActiveTab() {
        return activeTabId ? getTab(activeTabId) : null;
      }

      function tabTitleFromUrl(url) {
        if (!url) return "New Tab";
        try {
          return new URL(url).hostname || "New Tab";
        } catch {
          return url.length > 30 ? url.slice(0, 30) + "…" : url || "New Tab";
        }
      }

      function getDisplayedValue(tab) {
        if (!tab) return "";
        return tab.isSearch ? tab.displayUrl : tab.url.replace(/^\w+:\/\//, "");
      }

      function getProtocolBadge(tab) {
        if (!tab || tab.isSearch || !tab.url) return "";
        if (tab.url.startsWith("https://")) return "https://";
        if (tab.url.startsWith("http://")) return "http://";
        return "";
      }

      function renderAllHomescreens() {
        tabs.forEach((tab) => renderHomescreen(tab));
      }

      function renderHomescreen(tab) {
        if (!tab?.home) return;

        const now = new Date();
        const timeNode = tab.home.querySelector("[data-role='time']");
        const dateNode = tab.home.querySelector("[data-role='date']");
        const bookmarksNode = tab.home.querySelector("[data-role='bookmarks']");
        const listNode = tab.home.querySelector("[data-role='bookmark-list']");
        const backgroundInput = tab.home.querySelector("[data-role='background-input']");
        const challengeHint = tab.home.querySelector("[data-role='challenge-hint']");

        if (timeNode) timeNode.textContent = formatTime(now);
        if (dateNode) dateNode.textContent = formatDate(now);
        if (backgroundInput) backgroundInput.value = homeSettings.backgroundUrl;

        if (bookmarksNode) {
          bookmarksNode.innerHTML = homeSettings.bookmarks
            .map(
              (bookmark, index) => `
                <button type="button" class="bookmark-card" data-bookmark-index="${index}">
                  <span class="bookmark-icon">${escapeHtml(bookmark.accent)}</span>
                  <span class="bookmark-name">${escapeHtml(bookmark.name)}</span>
                  <span class="bookmark-url">${escapeHtml(new URL(bookmark.url).hostname)}</span>
                </button>
              `
            )
            .join("");
        }

        if (listNode) {
          listNode.innerHTML = homeSettings.bookmarks
            .map(
              (bookmark, index) => `
                <div class="bookmark-list-item">
                  <div>
                    <div class="bookmark-list-name">${escapeHtml(bookmark.name)}</div>
                    <div class="bookmark-list-url">${escapeHtml(bookmark.url)}</div>
                  </div>
                  <button type="button" class="bookmark-delete" data-delete-bookmark="${index}" aria-label="Delete bookmark">×</button>
                </div>
              `
            )
            .join("");
        }

        if (homeSettings.backgroundUrl) {
          tab.home.classList.add("has-custom-bg");
          tab.home.style.backgroundImage = `linear-gradient(180deg, rgba(6, 10, 18, 0.5), rgba(6, 10, 18, 0.84)), url("${homeSettings.backgroundUrl.replace(/(["\\])/g, "\\$1")}")`;
        } else {
          tab.home.classList.remove("has-custom-bg");
          tab.home.style.backgroundImage = "";
        }

        if (challengeHint) {
          challengeHint.classList.toggle("visible", challengeLikely(tab));
        }
      }

      function createHomescreen(tab) {
        const home = document.createElement("div");
        home.className = "tab-pane-home";
        home.innerHTML = `
          <div class="home-shell">
            <div class="home-topbar">
              <button type="button" class="home-chip" data-action="toggle-customize">Customize</button>
            </div>
            <section class="home-hero">
              <div class="home-brand">Plutonium</div>
              <div class="home-time" data-role="time"></div>
              <div class="home-date" data-role="date"></div>
              <div class="home-subtitle">
                Launch into the web with your own launchpad. Keep your favorite places close, swap in a background, and use Direct mode when verification pages need more room to breathe.
              </div>
              <div class="challenge-hint" data-role="challenge-hint">
                Direct mode is handy for CAPTCHA and verification-heavy pages.
              </div>
            </section>
            <section class="home-grid">
              <div class="bookmark-board">
                <h2 class="board-title">Launch Deck</h2>
                <div class="bookmark-grid" data-role="bookmarks"></div>
              </div>
              <aside class="customize-card" data-role="customize-card">
                <div>
                  <h2 class="customize-title">Customize</h2>
                  <div class="home-subtitle">Backgrounds and bookmarks are saved to this browser locally.</div>
                </div>
                <div class="customize-body">
                  <label class="panel-label">
                    Background Image URL
                    <input class="panel-input" data-role="background-input" type="url" placeholder="https://images.example.com/wallpaper.jpg" />
                  </label>
                  <div class="panel-row">
                    <button type="button" class="panel-button primary" data-action="save-background">Apply Background</button>
                    <button type="button" class="panel-button" data-action="reset-background">Reset</button>
                  </div>
                  <form class="panel-row" data-role="bookmark-form">
                    <input class="panel-input" data-role="bookmark-name" type="text" placeholder="Bookmark name" />
                    <input class="panel-input" data-role="bookmark-url" type="url" placeholder="https://example.com" />
                    <button type="submit" class="panel-button primary">Add Bookmark</button>
                  </form>
                  <div class="bookmark-list" data-role="bookmark-list"></div>
                </div>
              </aside>
            </section>
          </div>
        `;

        home.addEventListener("click", (event) => {
          const bookmarkCard = event.target.closest("[data-bookmark-index]");
          if (bookmarkCard) {
            const bookmark = homeSettings.bookmarks[Number(bookmarkCard.dataset.bookmarkIndex)];
            if (bookmark) {
              navigateInTab(tab, bookmark.url);
            }
            return;
          }

          const deleteButton = event.target.closest("[data-delete-bookmark]");
          if (deleteButton) {
            homeSettings.bookmarks.splice(Number(deleteButton.dataset.deleteBookmark), 1);
            saveHomeSettings();
            renderAllHomescreens();
            return;
          }

          const actionButton = event.target.closest("[data-action]");
          if (!actionButton) return;

          if (actionButton.dataset.action === "toggle-customize") {
            home.querySelector("[data-role='customize-card']")?.classList.toggle("open");
            return;
          }

          if (actionButton.dataset.action === "save-background") {
            const value = home.querySelector("[data-role='background-input']")?.value?.trim() || "";
            homeSettings.backgroundUrl = value;
            saveHomeSettings();
            renderAllHomescreens();
            return;
          }

          if (actionButton.dataset.action === "reset-background") {
            homeSettings.backgroundUrl = "";
            saveHomeSettings();
            renderAllHomescreens();
          }
        });

        home.querySelector("[data-role='bookmark-form']")?.addEventListener("submit", (event) => {
          event.preventDefault();
          const nameInput = home.querySelector("[data-role='bookmark-name']");
          const urlInput = home.querySelector("[data-role='bookmark-url']");
          const bookmark = normalizeBookmark({
            name: nameInput?.value || "",
            url: urlInput?.value || "",
          });

          if (!bookmark) return;

          homeSettings.bookmarks = [...homeSettings.bookmarks, bookmark];
          saveHomeSettings();
          if (nameInput) nameInput.value = "";
          if (urlInput) urlInput.value = "";
          renderAllHomescreens();
        });

        tab.home = home;
        renderHomescreen(tab);
        ensureClockTicker();
        return home;
      }

      function readFrameTargetUrl(frame) {
        try {
          const current = new URL(frame.contentWindow?.location?.href || "", window.location.origin);
          return current.searchParams.get("url") || "";
        } catch {
          return "";
        }
      }

      function syncTabHistory(tab, url) {
        if (!url) return;
        const current = tab.historyEntries[tab.historyIndex];
        if (current === url) return;

        const previous = tab.historyEntries[tab.historyIndex - 1];
        const next = tab.historyEntries[tab.historyIndex + 1];
        if (previous === url) {
          tab.historyIndex -= 1;
          return;
        }
        if (next === url) {
          tab.historyIndex += 1;
          return;
        }

        const historyEntries = tab.historyEntries.slice(0, tab.historyIndex + 1);
        historyEntries.push(url);
        tab.historyEntries = historyEntries;
        tab.historyIndex = historyEntries.length - 1;
      }

      function renderTab(tab) {
        if (!tab?.dom) return;
        tab.dom.querySelector(".chrome-tab-title").textContent = tab.title;
        tab.dom.classList.toggle("loading", Boolean(tab.loading));
      }

      function setTabLoading(tab, loading) {
        if (!tab) return;
        tab.loading = loading;
        tab.pane?.setAttribute("aria-busy", loading ? "true" : "false");
        renderTab(tab);
        if (tab.id === activeTabId) {
          chromeContent.classList.toggle("loading", loading);
        }
        updateControls();
      }

      function setTabTitle(tab, nextTitle) {
        if (!tab) return;
        tab.title = nextTitle && nextTitle.trim() ? nextTitle.trim() : tabTitleFromUrl(tab.url);
        renderTab(tab);
        renderHomescreen(tab);
        updateControls();
      }

      function updateAddressBar(tab = getActiveTab()) {
        input.value = getDisplayedValue(tab);
        protoSpan.textContent = getProtocolBadge(tab);
      }

      function updateControls() {
        const tab = getActiveTab();
        const canReload = Boolean(tab?.mode === "web" && (tab.url || tab?.frame?.src));
        const canGoBack = Boolean(tab && tab.historyIndex > 0 && !tab.loading);
        const canGoForward = Boolean(tab && tab.historyIndex < tab.historyEntries.length - 1 && !tab.loading);

        reloadBtn.disabled = !canReload;
        backBtn.disabled = !canGoBack;
        forwardBtn.disabled = !canGoForward;
        openDirectBtn.disabled = !Boolean(tab?.mode === "web" && tab?.url);
        openDirectBtn.classList.toggle("attention", challengeLikely(tab));
        chromeContent.classList.toggle("loading", Boolean(tab?.loading));
      }

      function renderTabActive() {
        tabStrip.querySelectorAll(".chrome-tab").forEach((element) => {
          element.classList.toggle("active", element.dataset.tabId === activeTabId);
        });

        tabPanes.querySelectorAll(".tab-pane").forEach((element) => {
          const active = element.dataset.tabId === activeTabId;
          element.classList.toggle("active", active);
          element.setAttribute("aria-hidden", active ? "false" : "true");
        });

        updateControls();
      }

      function switchTab(id) {
        activeTabId = id;
        requestAnimationFrame(() => {
          renderTabActive();
          updateAddressBar(getTab(id));
          getTab(id)?.dom?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        });
      }

      function createTab(id = nextId(), options = {}) {
        const hasUrl = Boolean(options.url);
        const tab = {
          id,
          title: options.title ?? "New Tab",
          url: options.url ?? "",
          displayUrl: options.displayUrl ?? "",
          isSearch: options.isSearch ?? false,
          loading: hasUrl,
          historyEntries: hasUrl ? [options.url] : [],
          historyIndex: hasUrl ? 0 : -1,
          mode: hasUrl ? "web" : "home",
        };
        tabs.push(tab);

        const tabEl = document.createElement("div");
        tabEl.className = "chrome-tab" + (activeTabId === id ? " active" : "");
        tabEl.dataset.tabId = id;
        tabEl.innerHTML = `
          <div class="chrome-tab-favicon"></div>
          <span class="chrome-tab-title">${escapeHtml(tab.title)}</span>
          <button type="button" class="chrome-tab-close" aria-label="Close tab">×</button>
        `;
        tabEl.querySelector(".chrome-tab-close").addEventListener("click", (event) => {
          event.stopPropagation();
          closeTab(id);
        });
        tabEl.addEventListener("click", (event) => {
          if (!event.target.classList.contains("chrome-tab-close")) {
            switchTab(id);
          }
        });
        tabStrip.appendChild(tabEl);
        tab.dom = tabEl;

        const pane = document.createElement("div");
        pane.className = "tab-pane" + (activeTabId === id ? " active" : "");
        pane.dataset.tabId = id;
        pane.setAttribute("aria-busy", tab.loading ? "true" : "false");

        const home = createHomescreen(tab);
        pane.appendChild(home);

        const iframe = document.createElement("iframe");
        iframe.title = "Page content";
        iframe.loading = "eager";
        iframe.sandbox =
          "allow-same-origin allow-forms allow-scripts allow-popups allow-popups-to-escape-sandbox allow-pointer-lock allow-modals allow-downloads allow-storage-access-by-user-activation";
        iframe.src = tab.url ? proxiedSrc(tab.url) : "about:blank";
        iframe.classList.toggle("is-hidden", !hasUrl);
        pane.appendChild(iframe);
        tabPanes.appendChild(pane);

        tab.pane = pane;
        tab.frame = iframe;
        renderTab(tab);
        syncPaneMode(tab);

        iframe.addEventListener("load", () => {
          handleFrameLoad(id);
        });

        return tab;
      }

      function handleFrameLoad(id) {
        const tab = getTab(id);
        if (!tab) return;

        const decodedTarget = readFrameTargetUrl(tab.frame);
        if (decodedTarget) {
          tab.mode = "web";
          tab.url = decodedTarget;
          tab.isSearch = false;
          tab.displayUrl = "";
          syncTabHistory(tab, decodedTarget);
          try {
            setTabTitle(tab, tab.frame.contentDocument?.title || tabTitleFromUrl(decodedTarget));
          } catch {
            setTabTitle(tab, tabTitleFromUrl(decodedTarget));
          }
        }

        syncPaneMode(tab);
        setTabLoading(tab, false);
        if (tab.id === activeTabId) {
          updateAddressBar(tab);
        }
      }

      function closeTab(id) {
        const currentIndex = tabs.findIndex((tab) => tab.id === id);
        if (currentIndex === -1) return;

        const tab = tabs[currentIndex];
        let done = false;
        const onDone = () => {
          if (done) return;
          done = true;

          tab.dom?.remove();
          tab.pane?.remove();
          tabs.splice(currentIndex, 1);

          if (tabs.length === 0) {
            activeTabId = null;
            createTab(nextId());
            switchTab(tabs[0].id);
            return;
          }

          if (activeTabId === id) {
            const nextTab = tabs[Math.min(currentIndex, tabs.length - 1)];
            switchTab(nextTab.id);
          } else {
            renderTabActive();
          }
        };

        tab.dom?.classList.add("closing");
        if (tab.dom) {
          tab.dom.addEventListener("transitionend", onDone, { once: true });
          setTimeout(onDone, 200);
        } else {
          onDone();
        }
      }

      function looksLikeUrl(value) {
        const trimmed = value.trim();
        if (!trimmed || /\s/.test(trimmed)) return false;

        try {
          const withScheme = /^\w+:\/\//i.test(trimmed) ? trimmed : "https://" + trimmed;
          const candidate = new URL(withScheme);
          return Boolean(candidate.hostname && candidate.hostname.includes("."));
        } catch {
          return false;
        }
      }

      function parseNavigationTarget(raw) {
        const trimmed = raw.trim();
        if (!trimmed) return null;

        if (looksLikeUrl(trimmed)) {
          const withScheme = trimmed.startsWith("http://") || trimmed.startsWith("https://") ? trimmed : "https://" + trimmed;
          try {
            const target = new URL(withScheme);
            return {
              finalUrl: target.href,
              displayUrl: target.href,
              isSearch: false,
              title: target.hostname || "New Tab",
            };
          } catch {}
        }

        return {
          finalUrl: "https://www.google.com/search?q=" + encodeURIComponent(trimmed),
          displayUrl: trimmed,
          isSearch: true,
          title: "Search",
        };
      }

      function navigate(raw) {
        const tab = getActiveTab();
        const target = parseNavigationTarget(raw);
        if (!tab || !target) return;

        navigateInTab(tab, target.finalUrl, target);
      }

      function navigateInTab(tab, rawUrl, parsedTarget) {
        const target = parsedTarget || parseNavigationTarget(rawUrl);
        if (!tab || !target) return;

        tab.mode = "web";
        tab.url = target.finalUrl;
        tab.displayUrl = target.displayUrl;
        tab.isSearch = target.isSearch;
        syncTabHistory(tab, target.finalUrl);
        setTabTitle(tab, target.title);
        syncPaneMode(tab);
        updateAddressBar(tab);
        setTabLoading(tab, true);
        tab.frame.src = proxiedSrc(target.finalUrl);
      }

      function syncPaneMode(tab) {
        if (!tab?.home || !tab?.frame) return;
        const showHome = tab.mode !== "web";
        tab.home.classList.toggle("hidden", !showHome);
        tab.frame.classList.toggle("is-hidden", showHome);
        renderHomescreen(tab);
      }

      function stepHistory(direction) {
        const tab = getActiveTab();
        if (!tab || tab.loading) return;

        const targetIndex = tab.historyIndex + direction;
        if (targetIndex < 0 || targetIndex >= tab.historyEntries.length) return;

        setTabLoading(tab, true);
        try {
          if (direction < 0) {
            tab.frame.contentWindow?.history?.back();
          } else {
            tab.frame.contentWindow?.history?.forward();
          }
        } catch {
          const targetUrl = tab.historyEntries[targetIndex];
          tab.historyIndex = targetIndex;
          tab.mode = "web";
          tab.url = targetUrl;
          tab.isSearch = false;
          tab.displayUrl = "";
          syncPaneMode(tab);
          updateAddressBar(tab);
          tab.frame.src = proxiedSrc(targetUrl);
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        navigate(input.value);
      });

      reloadBtn.addEventListener("click", () => {
        const tab = getActiveTab();
        if (!tab || tab.mode !== "web") return;
        setTabLoading(tab, true);
        try {
          tab.frame.contentWindow?.location?.reload();
        } catch {
          tab.frame.src = tab.url ? proxiedSrc(tab.url) : tab.frame.src;
        }
      });

      openDirectBtn.addEventListener("click", () => {
        const tab = getActiveTab();
        if (!tab?.url) return;
        window.open(proxiedSrc(tab.url), "_blank", "noopener,noreferrer");
      });

      backBtn.addEventListener("click", () => {
        stepHistory(-1);
      });

      forwardBtn.addEventListener("click", () => {
        stepHistory(1);
      });

      newTabBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        const id = nextId();
        createTab(id);
        switchTab(id);
        input.value = "";
        protoSpan.textContent = "";
        input.focus();
      });

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.source !== FRAME_EVENT_SOURCE) return;

        const tab = getTabByWindow(event.source);
        if (!tab) return;

        if (data.kind === "loading") {
          setTabLoading(tab, true);
          return;
        }

        if (typeof data.title === "string" && data.title.trim()) {
          setTabTitle(tab, data.title);
        }

        if (data.kind === "commit" && typeof data.url === "string" && /^https?:/i.test(data.url)) {
          tab.mode = "web";
          tab.url = data.url;
          tab.isSearch = false;
          tab.displayUrl = "";
          syncTabHistory(tab, data.url);
          syncPaneMode(tab);
          setTabLoading(tab, false);
          if (tab.id === activeTabId) {
            updateAddressBar(tab);
          }
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.ctrlKey || event.metaKey) {
          if (event.key === "t") {
            event.preventDefault();
            newTabBtn.click();
            return;
          }
          if (event.key === "w") {
            event.preventDefault();
            const tab = getActiveTab();
            if (tab) closeTab(tab.id);
            return;
          }
          if (event.key === "r") {
            event.preventDefault();
            reloadBtn.click();
            return;
          }
          if (event.key === "l") {
            event.preventDefault();
            input.focus();
            input.select();
            return;
          }
          if (event.key === "Tab" && tabs.length > 1) {
            event.preventDefault();
            const currentIndex = tabs.findIndex((tab) => tab.id === activeTabId);
            const nextIndex = event.shiftKey
              ? (currentIndex - 1 + tabs.length) % tabs.length
              : (currentIndex + 1) % tabs.length;
            switchTab(tabs[nextIndex].id);
            return;
          }
        }

        if (event.altKey) {
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            backBtn.click();
            return;
          }
          if (event.key === "ArrowRight") {
            event.preventDefault();
            forwardBtn.click();
            return;
          }
          if (event.key === "d") {
            event.preventDefault();
            input.focus();
            input.select();
          }
        }
      });

      document.getElementById("chrome-omnibox")?.addEventListener("click", (event) => {
        if (event.target !== input) {
          input.focus();
        }
      });

      createTab(nextId());
      switchTab(tabs[0].id);
    </script>
  </body>
</html>
